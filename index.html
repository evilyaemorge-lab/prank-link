<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تهانينا!</title>
<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(135deg,#0f9d58,#34a853);
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    text-align:center;
}
.box{
    background:rgba(0,0,0,.3);
    padding:30px;
    border-radius:20px;
    max-width:350px;
}
button{
    margin-top:20px;
    padding:12px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
}
</style>
</head>
<body>

<div class="box">
    <h1>🎉 مبروك! 🎉</h1>
    <h2>لقد ربحت 10,000 جنيه مصري!</h2>
    <p>اضغط على الزر لاستلام جائزتك.</p>

    <button onclick="prank()">استلام الجائزة</button>

    <div id="msg"></div>
</div>

<script>
function prank(){
    document.getElementById("msg").innerHTML = `
    <h2>😂😂😂</h2>
    <h3>اتضحك عليك!</h3>
    <p>مفيش 10,000 جنيه 😅</p>
    <p>دي كانت مقلب من صاحبك ❤️</p>
    `;
}
</script>

</body>
</html>
